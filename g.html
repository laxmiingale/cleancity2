<div class="form-box">
<h2>Report Garbage</h2>
<form id="form">

  <input type="text" id="name" placeholder="Name">

  <input type="tel" id="phone" placeholder="Phone Number">

  <input type="text" id="area" placeholder="Area / City">

  <input type="text" id="address" placeholder="Manual Address (Street / Landmark)">

  <select id="waste">
    <option value="">Waste Type</option>
    <option>Plastic</option>
    <option>Food Waste</option>
    <option>Mixed Waste</option>
  </select>

  <select id="priority">
    <option value="">Priority</option>
    <option>Low</option>
    <option>Medium</option>
    <option>High</option>
  </select>

  <textarea id="desc" placeholder="Description"></textarea>

  <input type="file" id="image">

  <video id="camera" autoplay></video>

  <button type="button" id="openCam">Open Camera</button>
  <button type="button" id="captureBtn">Capture Photo</button>

  <canvas id="canvas" style="display:none;"></canvas>
  <img id="preview">

  <button type="submit">Submit Complaint</button>

</form>
</div>

<!-- ========================== ADMIN LOGIN TEMPLATE ========================== -->
<!-- Keep the same design but link IDs for JS -->
<div class="admin-login" style="display:none;" id="adminLoginBox">
  <h2>Admin Login</h2>
  <input type="text" id="adminUser" placeholder="Username">
  <input type="password" id="adminPass" placeholder="Password">
  <button type="button" onclick="adminLogin()">Login</button>
</div>


<script src="script.js"></script>
